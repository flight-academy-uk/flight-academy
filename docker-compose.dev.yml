# Local dev stack — Postgres only at WS#3. MinIO + other services land
# alongside the subsystems that need them. Loopback-only port binding per
# ADR-004 §F (secure-by-default — the dev container's network namespace is
# not the security boundary on a multi-user dev host).
#
# Postgres major version (16) matches what CNPG runs in hosted production
# per ADR-002 §G so the migrations exercise the same engine.
#
# DATABASE_URL: postgres://postgres@127.0.0.1:5432/flight_academy_dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: flight_academy_dev
      # trust auth for local dev only — the bind below is loopback-only and
      # the dev DB carries no production data. Hosted production uses CNPG
      # with cert-based auth; self-host uses docker-compose env credentials
      # generated by the install script (ADR-002 §I).
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - flight-academy-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_academy_dev"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  flight-academy-pg:
