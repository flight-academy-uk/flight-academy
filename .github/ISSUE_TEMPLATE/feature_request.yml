name: Feature request
description: Propose a new capability or an enhancement to an existing one.
title: "feat: <short summary>"
labels: ["kind:feature", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.

        Before you continue:

        - For non-trivial features, please **open a Discussion first** to socialise the idea: <https://github.com/flight-academy-uk/flight-academy/discussions>. Saves both sides time if the design does not fit.
        - **Architectural changes** require an ADR in `docs/architecture/`. See [CONTRIBUTING.md](https://github.com/flight-academy-uk/flight-academy/blob/main/CONTRIBUTING.md).
        - This template asks for the **problem first**, then the proposal. Please describe the problem before the solution — maintainers may suggest a different approach to the same underlying need.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: |
        Describe the underlying need, **not** the solution. Who is affected, what are they trying to accomplish, and what stops them today?

        Good: "Instructors cannot see at a glance which students are out of currency for night flying, so they discover this at dispatch."

        Less useful: "Add a night-currency dashboard."
      placeholder: As a <persona>, I need to <accomplish a goal>, but today <obstacle>.
    validations:
      required: true

  - type: dropdown
    id: personas
    attributes:
      label: Affected personas
      description: Who experiences this problem? Select all that apply.
      multiple: true
      options:
        - Student pilot
        - Instructor
        - School admin
        - Part 145 engineer
        - Airfield operator
        - Individual pilot
        - System administrator
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the platform would this touch?
      options:
        - auth
        - api
        - web
        - mobile
        - db
        - integrations
        - safety
        - ground-school
        - accounting
        - deployment
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Optional. If you already have a design in mind, sketch it here.

        Maintainers may propose alternative approaches — describing the problem clearly above gives us the freedom to do that.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? Behaviour-focused bullets work best.
      placeholder: |
        - Instructors see a "currency" column on the bookings page
        - Currency status is computed from the last 90 days of flight logs
        - Out-of-currency students cannot be dispatched without an instructor override
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you weigh? Why did you discount them?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to regulations, related issues, prior art, screenshots of how other tools solve this.
    validations:
      required: false

  - type: checkboxes
    id: dco
    attributes:
      label: Developer Certificate of Origin
      description: |
        Filing a request does not require a DCO sign-off, but any patch you propose later will.
        See [CONTRIBUTING.md](https://github.com/flight-academy-uk/flight-academy/blob/main/CONTRIBUTING.md#developer-certificate-of-origin-dco).
      options:
        - label: I understand that any code I contribute to implement this feature must be signed off under the DCO and licensed under AGPL-3.0-only.
          required: true
