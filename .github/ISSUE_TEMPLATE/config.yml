blank_issues_enabled: false
contact_links:
  - name: Report a security vulnerability
    url: https://github.com/flight-academy-uk/flight-academy/security/advisories/new
    about: |
      Do NOT file security issues publicly. Use GitHub Private Security Advisories — encrypted in transit, scoped to maintainers, audit-logged. See SECURITY.md for the full disclosure policy.

  - name: Ask a question
    url: https://github.com/flight-academy-uk/flight-academy/discussions
    about: |
      Open-ended questions, design discussions, and "how do I…" belong in GitHub Discussions. Issues are reserved for actionable bugs, features, and documentation work.

  - name: Code of Conduct concern
    url: mailto:conduct@flight-academy.app
    about: |
      Report Code of Conduct violations confidentially to the maintainers. Mail to this address is treated as confidential — see CODE_OF_CONDUCT.md for the full process.
