# Dependabot v2 configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Conventions:
#   - All updates run weekly, Monday 09:00 Europe/London (one batch to review).
#   - Patch + minor updates are GROUPED per ecosystem; majors come as separate
#     PRs so they get individual review.
#   - Commit message prefixes use a Conventional-Commits scope per ecosystem,
#     so the squash-merge history stays readable.
#   - Reviewers default to the maintainer; CODEOWNERS handles fan-out as the
#     team grows.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Rust workspace (root Cargo.toml)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "lang:rust"
    groups:
      cargo-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # ---------------------------------------------------------------------------
  # Web frontend tooling — re-added when MASH foundations land (ADR-020 §O)
  # ---------------------------------------------------------------------------
  # ADR-020 supersedes ADR-014: SvelteKit/`apps/web` removed. The MASH web
  # surface is server-rendered by `apps/api` (Maud templates compile into the
  # Rust binary) with vendored HTMX + Alpine on the client and Tailwind v4
  # compiled at build time via Bun CLI. None of those introduce an npm
  # lockfile that Dependabot can watch today; the Tailwind dev dependency
  # arrives in the MASH foundations PR and this block is restored then with
  # the correct directory + ecosystem scope.

  # ---------------------------------------------------------------------------
  # GitHub Actions workflows
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps-ci)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "area:ci"
    groups:
      actions-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # ---------------------------------------------------------------------------
  # Container images — anticipated at deploy/docker/
  # If this directory does not exist yet, Dependabot will simply find no
  # Dockerfiles and report nothing; harmless until the first Dockerfile lands.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps-docker)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "area:deploy"
    groups:
      docker-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
