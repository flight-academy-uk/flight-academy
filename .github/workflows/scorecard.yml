# OpenSSF Scorecard — automated supply-chain security analysis.
#
# Runs weekly, on push to `main`, and when a branch-protection rule changes.
# Publishes results to the public Scorecard API (which backs the README badge)
# and uploads SARIF to GitHub code scanning (free for public repositories).
#
# All actions are pinned to a full commit SHA; the trailing comment records the
# human-readable version. Dependabot keeps both the SHA and the comment current.
#
# Docs: https://github.com/ossf/scorecard-action

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC
  push:
    branches: ["main"]

# Coalesce overlapping runs on the same ref (e.g. a push lands during a
# weekly schedule). Runs on main are never cancelled mid-flight — Scorecard
# publishes badge/SARIF results that downstream tools consume.
concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least privilege by default; the analysis job widens only the two scopes it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Defensive cap. Analysis typically runs in 2-5 minutes; 30 catches a
    # stuck checkout, network, or scorecard internal hang without burning
    # the 6-hour default.
    timeout-minutes: 30
    permissions:
      security-events: write # upload SARIF to the code-scanning dashboard
      id-token: write # publish results to the Scorecard API (OIDC) for the badge
      # contents: read and actions: read are only required for PRIVATE repos.

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF as a workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
