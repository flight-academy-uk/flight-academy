# Developer Certificate of Origin (DCO) check
#
# Every commit in a pull request must carry a `Signed-off-by:` trailer.
# This asserts the author's right to contribute the change under the
# project's AGPL-3.0-only licence. See:
#   - https://developercertificate.org
#   - CONTRIBUTING.md, section "Developer Certificate of Origin (DCO)"
#
# How to fix a failed run:
#
#   For the most recent commit only:
#     git commit --amend -s --no-edit
#     git push --force-with-lease
#
#   For multiple commits on the branch:
#     git rebase --signoff main
#     git push --force-with-lease
#
# Sign-off (`-s`) is the DCO. Cryptographic signing (`-S`) is separate and
# is also required on `main`. See CONTRIBUTING.md for SSH/GPG setup.

name: DCO

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

# Cancel superseded runs on the same PR head.
concurrency:
  group: dco-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Least-privilege: this workflow only needs to read the PR and its commits.
permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: Verify Signed-off-by on every commit
    runs-on: ubuntu-latest
    # Defensive cap. The check itself is a few git commands and concludes in
    # seconds; 10 minutes catches a stuck checkout/network without burning the
    # 6-hour default.
    timeout-minutes: 10
    # Dependabot is exempt from DCO: it cannot add a Signed-off-by trailer, and a
    # dependency bump is mechanical, not a copyrightable contribution. The
    # exemption is applied per-step (below) rather than skipping the whole job, so
    # the job still concludes "success" for Dependabot — this is a *required*
    # status check on main, and a skipped job can leave a required check
    # unsatisfied. Dependabot commits are still GPG-signed by GitHub, so the
    # required_signatures rule on main applies regardless.
    steps:
      - name: Check out PR head
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch enough history to see every commit on the PR.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          # The workflow only reads commit metadata; no git push back to origin.
          persist-credentials: false

      - name: Verify DCO sign-off
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        # Inlined rather than pulling a third-party action: the check is a few
        # lines of git, and every commit in the PR range must carry a
        # `Signed-off-by:` trailer whose email matches the commit author.
        # SHAs are passed via env (not interpolated into the script) to avoid
        # any expression-injection surface.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          status=0
          while read -r sha; do
            [ -n "$sha" ] || continue
            author="$(git show -s --format='%ae' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            if git show -s --format='%B' "$sha" \
                 | sed -n 's/^[Ss]igned-off-by:.*<\(.*\)>.*/\1/p' \
                 | grep -qxF "$author"; then
              echo "ok           $sha  $subject"
            else
              echo "NO SIGN-OFF  $sha  $subject  (author <$author>)"
              status=1
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          [ "$status" -eq 0 ] || { echo "::error::Every commit needs a Signed-off-by trailer matching its author email. See CONTRIBUTING.md (DCO)."; exit 1; }
