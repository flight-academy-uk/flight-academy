# Web CI — Tailwind compile + CSS bundle size budget.
#
# Separate from `ci.yml` so the bundle-size gate iterates independently:
# different cache namespace, different concurrency group, runs on a
# narrower path filter so a Rust-only change doesn't trip it.
#
# Today this gates the Tailwind output against a 20KB gzipped budget per
# ADR-020 §N step 4. Drift checks (tokens.json → tokens.css emitter) and
# CSS bundle Lighthouse runs will be added on top of this floor as the
# corresponding pipelines land.
#
# Pinning policy: all GitHub Actions are pinned to a full commit SHA with
# a trailing version comment. Dependabot keeps both current.

name: Web CI

on:
  push:
    branches: ["main"]
  pull_request:
    paths:
      - 'apps/api/package.json'
      - 'apps/api/bun.lock'
      - 'apps/api/styles/**'
      - 'apps/api/src/**/*.rs'
      - 'apps/api/build.rs'
      - '.github/workflows/web-ci.yml'

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  bundle-budget:
    name: CSS bundle size budget
    runs-on: ubuntu-latest
    # Tailwind compile + size check runs in well under a minute.
    # 10 catches stuck networks/builds without burning the default.
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Cache Bun install
        # Caches Bun's global tarball cache (not node_modules — keying that
        # on bun.lock is fragile, and `bun install` is fast when the global
        # cache is warm). Shares the cache key with ci.yml so a warm run
        # there warms this one and vice versa.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.HOME }}/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('apps/api/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Compile Tailwind
        # Same invocation `apps/api/build.rs` runs from cargo. Output
        # goes to /tmp so this job does not pollute the workspace —
        # the build artefact `apps/api/static/` is gitignored anyway
        # and not consumed beyond the size check below.
        working-directory: apps/api
        run: bun x @tailwindcss/cli -i ./styles/app.css -o /tmp/app.css --minify

      - name: Assert CSS bundle size budget
        # ADR-020 §N step 4: CSS bundle must be under 20KB gzipped. This
        # is the *operational* surface size the browser pays — the
        # uncompressed Tailwind output is allowed to be larger, but the
        # over-the-wire byte count is what matters for first-paint TTI.
        #
        # If this gate fails: investigate what landed in `styles/app.css`
        # or `@theme`/`@layer components` additions. Tailwind v4 prunes
        # unused classes via its content scanner, so a regression usually
        # means a wildcard import / inline-class explosion / new font
        # weights, not the utility surface itself.
        run: |
          raw=$(wc -c < /tmp/app.css)
          gz=$(gzip -c /tmp/app.css | wc -c)
          budget=20480
          printf 'CSS bundle: %s bytes raw, %s bytes gzipped (budget: %s gz)\n' \
              "$raw" "$gz" "$budget"
          if [ "$gz" -gt "$budget" ]; then
              printf '::error::CSS bundle exceeds %s-byte gzipped budget (ADR-020 §N step 4): %s\n' \
                  "$budget" "$gz"
              exit 1
          fi
