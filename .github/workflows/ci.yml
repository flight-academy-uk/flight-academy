# Continuous integration — Rust matrix
#
# Pinning policy: all GitHub Actions are pinned to a full commit SHA with a
# trailing version comment (e.g. `@<sha> # v1.2.3`); Dependabot keeps both
# the SHA and the comment current.
#
# Layout: two jobs in parallel — `lint` (fmt + clippy, no Postgres) and
# `test` (cargo test + ADR-003 §E schema-drift check, with a Postgres 18
# service). `lint` failures surface in well under a minute; `test` runs
# concurrently rather than blocked behind it. Both share the same
# Swatinem/rust-cache namespace so registry + target/ are warm after the
# first run on a branch.
#
# MASH web tooling (Tailwind compile + asset hashing per ADR-020 §O) and
# Mobile (apps/mobile) jobs land alongside those subsystems. Cross-cutting
# checks (cargo deny / cargo audit / actionlint / codespell) run via
# `scripts/check-all.sh` locally today; CI integration lands when justified.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs for the same ref. Saves minutes and avoids racing.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege at the workflow root. Individual jobs widen scopes when
# needed (none do today; future ghcr publishes will require packages:write
# at the job level, not the workflow level).
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Defensive cap. fmt + clippy on this workspace runs in well under 5
    # minutes; 15 minutes catches stuck networks/builds without burning the
    # 6-hour default.
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        # `apps/api/build.rs` invokes Bun + @tailwindcss/cli to compile the
        # MASH web surface's stylesheet (ADR-020 §O). Bun is therefore a
        # build-time dependency for any cargo command that compiles the
        # `flight-academy-api` package, including `cargo clippy --all-targets`.
        # Production runtime does not include Bun — it is dev-tooling only.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Cache Bun install
        # Caches Bun's global tarball cache (not node_modules — keying that
        # on bun.lock is fragile, and `bun install` is fast when the global
        # cache is warm). Same posture as the deleted Web CI cache step.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.HOME }}/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('apps/api/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Rust build cache
        # Caches ~/.cargo/{registry,git} + target/ keyed on Cargo.lock +
        # workspace fingerprint. PR caches scope to the PR's branch; they
        # cannot poison main's cache (GitHub's documented cache scoping).
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    # Tests bring up testcontainers (Postgres pull + start) and run the full
    # suite. Currently completes well under 10 minutes; 30 is the defensive
    # cap.
    timeout-minutes: 30
    # A real Postgres 18 service for the ADR-003 §E schema-drift check.
    # Integration tests bring their own containers via testcontainers and
    # ignore this one; it exists only for the `migrate + pg_dump + diff`
    # step further down.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: flight_academy_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flight_academy_dev"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        # Same rationale as the `lint` job: `apps/api/build.rs` requires Bun
        # at compile time (ADR-020 §O Tailwind dev tooling).
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.HOME }}/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('apps/api/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test
        # Tests use testcontainers; the runner already has Docker. The
        # `services.postgres` container above is ignored here.
        run: cargo test --workspace

      - name: cargo test (--features embedded-static)
        # Self-host single-binary distribution variant per ADR-020 §O —
        # `rust-embed` bakes `apps/api/static/` into the binary. The home
        # integration tests cover the `embedded-static` code path
        # (`embedded_static_serves_real_app_css_bytes`); running them here
        # locks in coverage so a regression in the embedded handler can't
        # land silently while the default `ServeDir` path stays green.
        # Scoped to `-p flight-academy-api` because the feature is declared
        # only on that crate; scoped to `--test home` to keep the extra CI
        # time bounded (the other integration tests don't depend on the
        # static-asset path).
        run: cargo test -p flight-academy-api --features embedded-static --test home

      - name: Apply migrations to the schema-diff fixture
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/flight_academy_dev
        run: cargo run --bin flight-academy --quiet -- migrate

      - name: Schema-drift check (ADR-003 §E)
        # pg_dump emits a per-invocation `\restrict <nonce>` line (psql
        # meta-command-injection guard) and version-stamp comments; both
        # change every run and are filtered out for determinism. Mirrors
        # `scripts/regenerate-schema.sh`.
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          docker exec "$POSTGRES_CONTAINER" pg_dump \
              --schema-only --no-owner --no-privileges \
              -U postgres -d flight_academy_dev \
            | grep -Ev '^\\(restrict|unrestrict) ' \
            | grep -Ev '^-- Dumped (from database|by pg_dump) version' \
            > /tmp/schema.actual.sql
          diff -u crates/flight-academy-db/schema.sql /tmp/schema.actual.sql
