# cargo-deny configuration — supply-chain gate for the Flight Academy workspace.
#
# Runs locally via `scripts/check-supply-chain.sh` and in CI (when the
# Rust workflow lands per walking-skeleton commit #5). Catches what
# `cargo audit` does plus license drift, duplicate versions, untrusted
# sources, and (when ADR-017 implementation lands) banned types outside
# the integrations crate.
#
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# -----------------------------------------------------------------------------
# Advisories
# -----------------------------------------------------------------------------
# RustSec advisory database. Vulnerabilities deny; unmaintained warn (still
# usable but worth tracking); yanked deny (someone yanked it for a reason).
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0436 — `paste` 1.0.15 is unmaintained (dtolnay deprecated
    # the crate 2024-10-07). Pulled transitively via `utoipa-axum 0.2.0`.
    # `paste` is a compile-time token-pasting macro; no runtime exposure.
    # Re-evaluate when utoipa-axum migrates off it.
    "RUSTSEC-2024-0436",
]

# -----------------------------------------------------------------------------
# Licenses
# -----------------------------------------------------------------------------
# Flight Academy ships under AGPL-3.0-only. Consuming permissive licences
# (MIT / Apache-2.0 / BSD / ISC / MPL-2.0 / Unicode) is fine — they permit
# incorporation into AGPL distribution. GPL-3.0 / AGPL-3.0 from a third
# party would force coordination with that copyright holder; SSPL / BUSL
# / proprietary are non-starters for an OSS project.
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Our own crates ship AGPL-3.0-only. cargo-deny would otherwise flag
    # the workspace's own license as un-allowed. "AGPL-3.0-only" is the
    # canonical SPDX identifier; "AGPL-3.0" (without `-only` / `-or-later`)
    # is the deprecated alias and does NOT match what the workspace uses.
    "AGPL-3.0-only",
]

# -----------------------------------------------------------------------------
# Bans
# -----------------------------------------------------------------------------
# Duplicate versions in the tree are a soft signal (slow builds, bigger
# binaries); not a fatal error in v1. Wildcards (`*` version spec) are
# deny — they break reproducibility and are how supply-chain typo-squat
# attacks get in.
#
# The `deny` list will grow when ADR-017's outbound-HTTP chokepoint lands:
# direct construction of `reqwest::Client` / `reqwest::ClientBuilder` /
# `hyper::Client` will be banned outside `flight-academy-integrations`.
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

# -----------------------------------------------------------------------------
# Sources
# -----------------------------------------------------------------------------
# Only crates.io is permitted. Unknown git sources are denied — a shadow
# fork pulled from a personal GitHub would otherwise be invisible.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
